<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Selector de Faixas — Brazilian Jiu-Jitsu</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --bg2:       #161616;
      --bg3:       #1e1e1e;
      --border:    #2a2a2a;
      --border2:   #3a3a3a;
      --text:      #e8e4df;
      --text2:     #888;
      --text3:     #555;
      --accent:    #c8102e;
      --radius:    10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      letter-spacing: 0.08em;
      color: var(--text);
      line-height: 1;
    }
    header h1 span { color: var(--accent); }
    header p {
      font-size: 13px;
      color: var(--text3);
      margin-top: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      width: 100%;
      max-width: 680px;
    }

    /* Tabs */
    .tab-row {
      display: flex;
      gap: 6px;
      margin-bottom: 1.5rem;
    }
    .tab {
      flex: 1;
      padding: 9px 0;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg3);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text2);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .tab:hover { border-color: var(--border2); color: var(--text); }
    .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* Section label */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    /* Belt grid */
    .belt-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .belt-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 8px 10px;
      cursor: pointer;
      text-align: center;
      background: var(--bg3);
      transition: transform 0.12s, border-color 0.12s;
    }
    .belt-card:hover { transform: translateY(-2px); border-color: var(--border2); }
    .belt-card.selected { border: 1.5px solid var(--accent); background: #1f1010; }
    .belt-name {
      font-size: 11px;
      color: var(--text2);
      margin-top: 8px;
      font-weight: 500;
      line-height: 1.3;
    }

    /* Tip dots */
    .tip-dots {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .tip-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      cursor: pointer;
      opacity: 0.3;
      transition: transform 0.1s, opacity 0.1s;
      flex-shrink: 0;
    }
    .tip-dot:hover { opacity: 0.7; }
    .tip-dot.active { opacity: 1; transform: scale(1.25); }
    .tip-dot.empty {
      background: var(--bg3);
      border: 1.5px dashed var(--border2);
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.25rem 0;
    }

    /* Result */
    .result-box {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 1rem 1.25rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
    }
    .result-info .info-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.06em;
      color: var(--text);
      line-height: 1;
    }
    .result-info .info-sub {
      font-size: 12px;
      color: var(--text2);
      margin-top: 3px;
    }
  </style>
</head>
<body>

<header>
  <h1>SELECTOR DE <span>FAIXAS</span></h1>
  <p>Brazilian Jiu-Jitsu — Niños &amp; Adultos</p>
</header>

<div class="card">
  <div id="bjj-root"></div>
</div>

<script>
const KIDS = [
  {id:'k-white',      name:'Blanca',            main:'#f0ede8', type:'solid'},
  {id:'k-grey-white', name:'Gris y blanca',     main:'#888888', type:'split-top-white'},
  {id:'k-grey',       name:'Gris',              main:'#888888', type:'solid'},
  {id:'k-grey-black', name:'Gris y negra',      main:'#888888', type:'split-top-black'},
  {id:'k-yel-white',  name:'Amarilla y blanca', main:'#f5c800', type:'split-top-white'},
  {id:'k-yellow',     name:'Amarilla',          main:'#f5c800', type:'solid'},
  {id:'k-yel-black',  name:'Amarilla y negra',  main:'#f5c800', type:'split-top-black'},
  {id:'k-ora-white',  name:'Naranja y blanca',  main:'#e86c00', type:'split-top-white'},
  {id:'k-orange',     name:'Naranja',           main:'#e86c00', type:'solid'},
  {id:'k-ora-black',  name:'Naranja y negra',   main:'#e86c00', type:'split-top-black'},
  {id:'k-grn-white',  name:'Verde y blanca',    main:'#1a8c3a', type:'split-top-white'},
  {id:'k-green',      name:'Verde',             main:'#1a8c3a', type:'solid'},
  {id:'k-grn-black',  name:'Verde y negra',     main:'#1a8c3a', type:'split-top-black'},
];
const ADULTS = [
  {id:'a-white',  name:'Branca',  main:'#f0ede8', type:'solid'},
  {id:'a-blue',   name:'Azul',    main:'#1e5fad', type:'solid'},
  {id:'a-purple', name:'Roxa',    main:'#6b3fa0', type:'solid'},
  {id:'a-brown',  name:'Marrom',  main:'#7a4a24', type:'solid'},
  {id:'a-black',  name:'Preta',   main:'#1a1a1a', type:'black', black:true},
];
const BLACK_TIPS  = ['#c8102e','#f0ede8','#c8102e','#f0ede8','#c8102e','#f0ede8'];
const BLACK_GRAUS = ['8-10 años','1º Dan','2º Dan','3º Dan','4º Dan','5º Dan','6º Dan'];
const MAX_TIPS = 4;

let state = { tab:'kids', belt:'k-grey-white', tips:0 };

function beltSVG(b, tips, w, h) {
  const tipW  = Math.round(w * 0.22);
  const mainW = w - tipW;
  const half  = Math.round(h / 2);
  let body = '';

  if (b.type === 'split-top-white') {
    body += `<rect x="0" y="0" width="${mainW}" height="${half}" fill="#f0ede8"/>`;
    body += `<rect x="0" y="${half}" width="${mainW}" height="${h - half}" fill="${b.main}"/>`;
  } else if (b.type === 'split-top-black') {
    body += `<rect x="0" y="0" width="${mainW}" height="${half}" fill="#1a1a1a"/>`;
    body += `<rect x="0" y="${half}" width="${mainW}" height="${h - half}" fill="${b.main}"/>`;
  } else {
    body += `<rect x="0" y="0" width="${mainW}" height="${h}" fill="${b.main}"/>`;
  }

  // tip section background
  body += `<rect x="${mainW}" y="0" width="${tipW}" height="${h}" fill="rgba(0,0,0,0.18)"/>`;

  // tip stripes
  if (tips > 0) {
    const count  = b.black ? 6 : MAX_TIPS;
    const slotW  = Math.floor((tipW - 4) / count);
    for (let i = 0; i < count; i++) {
      const filled = i < tips;
      let tc, stroke;
      if (b.black) {
        tc     = filled ? BLACK_TIPS[i] : 'transparent';
        stroke = filled ? 'none' : '#555';
      } else {
        tc     = filled ? '#f0ede8' : 'transparent';
        stroke = filled ? 'none' : 'rgba(255,255,255,0.2)';
      }
      body += `<rect x="${mainW + 2 + i * slotW}" y="3" width="${slotW - 1}" height="${h - 6}" rx="1" fill="${tc}" stroke="${stroke}" stroke-width="0.5"/>`;
    }
  }

  // outer border
  const borderCol = b.type === 'split-top-black' ? '#333'
                  : b.black                       ? '#444'
                  : b.main === '#f0ede8'           ? '#aaa'
                  : b.main;
  body += `<rect x="0" y="0" width="${w}" height="${h}" rx="3" fill="none" stroke="${borderCol}" stroke-width="1"/>`;

  return `<svg width="${w}" height="${h}" style="display:block;border-radius:4px;" xmlns="http://www.w3.org/2000/svg">${body}</svg>`;
}

function grauLabel(b, tips) {
  if (b.black) return BLACK_GRAUS[tips] || '';
  return tips === 0 ? 'Sin puntas' : `${tips} punta${tips > 1 ? 's' : ''}`;
}

function render() {
  const root = document.getElementById('bjj-root');
  const list = state.tab === 'kids' ? KIDS : ADULTS;
  const b    = [...KIDS, ...ADULTS].find(x => x.id === state.belt) || list[0];
  const maxT = b.black ? 6 : MAX_TIPS;

  // Tabs
  const tabs = `<div class="tab-row">
    <button class="tab${state.tab==='kids'?' active':''}" onclick="setTab('kids')">Niños</button>
    <button class="tab${state.tab==='adults'?' active':''}" onclick="setTab('adults')">Adultos</button>
  </div>`;

  // Belt cards
  const cards = list.map(belt => `
    <div class="belt-card${belt.id===state.belt?' selected':''}" onclick="selectBelt('${belt.id}')">
      ${beltSVG(belt, 0, 100, 24)}
      <div class="belt-name">${belt.name}</div>
    </div>`).join('');

  // Tip dots
  let dotHtml = `<div class="tip-dot empty${state.tips===0?' active':''}" onclick="setTips(0)" title="Sin puntas"></div>`;
  for (let i = 1; i <= maxT; i++) {
    const tc  = b.black ? BLACK_TIPS[i - 1] : '#f0ede8';
    const brd = tc === '#f0ede8' ? 'border:1.5px solid #aaa;' : '';
    dotHtml += `<div class="tip-dot${state.tips===i?' active':''}" style="background:${tc};${brd}" onclick="setTips(${i})" title="${i} punta${i>1?'s':''}"></div>`;
  }

  root.innerHTML = tabs
    + `<p class="section-label">Faixa</p><div class="belt-grid">${cards}</div>`
    + `<hr class="divider"/>`
    + `<p class="section-label">Puntas (graus)</p><div class="tip-dots">${dotHtml}</div>`
    + `<hr class="divider"/>`
    + `<p class="section-label">Resultado</p>
       <div class="result-box">
         ${beltSVG(b, state.tips, 180, 36)}
         <div class="result-info">
           <div class="info-name">${b.name}</div>
           <div class="info-sub">${grauLabel(b, state.tips)}</div>
         </div>
       </div>`;
}

function setTab(t) {
  state.tab  = t;
  state.belt = (t === 'kids' ? KIDS : ADULTS)[0].id;
  state.tips = 0;
  render();
}
function selectBelt(id) { state.belt = id; state.tips = 0; render(); }
function setTips(n)     { state.tips = state.tips === n ? 0 : n; render(); }

render();
</script>
</body>
</html>
